<!--
  Sistema de Reservas — Alojamento Assuruá (Serena O&M)

  >>> CONFIGURAÇÃO: cole as DUAS URLs logo abaixo, no início do <script>. <<<
  - POWER_AUTOMATE_URL  = URL do fluxo de RESERVA (o que grava e verifica conflito)
  - CONSULTA_URL        = URL do fluxo de CONSULTA (o que só lê e devolve quarto+datas)
  Deixe DEMO_MODE = false para usar os fluxos reais.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FF5246">
<title>Reservas · Alojamento</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --coral:#FF5246;
    --coral-dark:#E03e33;
    --grafite:#4B4B4B;
    --areia:#EDE9E5;
    --branco:#FFFFFF;
    --verde:#32CAA0;
    --verde-dark:#1f9b78;
    --sombra:0 4px 16px rgba(75,75,75,.10);
    --raio:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Poppins',system-ui,sans-serif;
    background:var(--areia);
    color:var(--grafite);
    line-height:1.5;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px 48px}

  /* Cabeçalho */
  header{
    background:var(--branco);
    padding:20px 16px 0;
    margin-bottom:20px;
    border-bottom:3px solid var(--coral);
  }
  header .inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:12px}
  .mark{
    width:40px;height:40px;border-radius:10px;
    background:var(--coral);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:18px;
  }
  header h1{font-size:18px;font-weight:600;color:var(--grafite)}
  header p{font-size:13px;color:#8a8a8a;font-weight:400}

  /* Abas */
  .tabs{max-width:560px;margin:14px auto 0;display:flex;gap:4px}
  .tab{
    flex:1;font-family:inherit;font-size:15px;font-weight:600;color:#8a8a8a;
    background:none;border:none;padding:12px 8px;cursor:pointer;
    border-bottom:3px solid transparent;margin-bottom:-3px;transition:color .15s,border-color .15s;
  }
  .tab.active{color:var(--coral);border-bottom-color:var(--coral)}

  .view{display:none}
  .view.active{display:block}

  /* Passos */
  .step-label{font-size:13px;font-weight:600;color:var(--coral);text-transform:uppercase;letter-spacing:.06em;margin:24px 4px 12px}

  /* Cartões de quarto */
  .rooms{display:grid;gap:12px}
  .room{
    background:var(--branco);border-radius:var(--raio);padding:16px;
    border:2px solid transparent;cursor:pointer;transition:border-color .15s, transform .1s;
    box-shadow:var(--sombra);
  }
  .room:active{transform:scale(.99)}
  .room.sel{border-color:var(--coral)}
  .room-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .room-name{font-weight:600;font-size:16px}
  .radio{width:22px;height:22px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;position:relative}
  .room.sel .radio{border-color:var(--coral)}
  .room.sel .radio::after{content:'';position:absolute;inset:4px;border-radius:50%;background:var(--coral)}
  .amen{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:12px;background:var(--areia);color:var(--grafite);padding:3px 9px;border-radius:20px;font-weight:500}

  /* Formulário */
  .card{background:var(--branco);border-radius:var(--raio);padding:18px;box-shadow:var(--sombra)}
  label{display:block;font-size:13px;font-weight:500;margin:14px 0 6px}
  label:first-child{margin-top:0}
  input{
    width:100%;font-family:inherit;font-size:16px;color:var(--grafite);
    padding:13px 14px;border:1.5px solid #ddd;border-radius:12px;background:#fafafa;
  }
  input:focus{outline:none;border-color:var(--coral);background:#fff}
  .dates{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* Botões */
  .btn{
    width:100%;font-family:inherit;font-size:16px;font-weight:600;
    padding:15px;border:none;border-radius:12px;cursor:pointer;margin-top:20px;
    transition:background .15s, opacity .15s;
  }
  .btn-primary{background:var(--coral);color:#fff}
  .btn-primary:active{background:var(--coral-dark)}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  /* Feedback */
  .feedback{margin-top:18px;border-radius:var(--raio);padding:18px;display:none}
  .feedback.show{display:block;animation:pop .25s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fb-ok{background:rgba(50,202,160,.12);border:1.5px solid var(--verde)}
  .fb-err{background:rgba(255,82,70,.10);border:1.5px solid var(--coral)}
  .fb-title{font-weight:600;font-size:16px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .fb-ok .fb-title{color:var(--verde-dark)}
  .fb-err .fb-title{color:var(--coral-dark)}
  .fb-body{font-size:14px;color:var(--grafite)}
  .fb-body b{font-weight:600}
  .next-btn{
    margin-top:12px;background:var(--coral);color:#fff;border:none;
    padding:10px 16px;border-radius:10px;font-family:inherit;font-weight:500;font-size:14px;cursor:pointer;
  }
  .codigo-box{margin-top:10px;font-size:18px;letter-spacing:.04em}
  .icon{width:22px;height:22px;flex-shrink:0}
  .spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:8px}
  .spinner-coral{border-color:rgba(255,82,70,.3);border-top-color:var(--coral)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .demo-flag{font-size:11px;text-align:center;color:#b0a89e;margin-top:24px}

  /* Calendário de consulta */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin:4px 0 16px}
  .cal-nav{background:var(--branco);border:1.5px solid #e2ddd7;color:var(--grafite);
    width:42px;height:42px;border-radius:12px;font-size:20px;cursor:pointer;font-family:inherit;line-height:1;
    box-shadow:var(--sombra);transition:background .15s}
  .cal-nav:active{background:var(--areia)}
  .month-label{font-weight:600;font-size:17px;text-transform:capitalize}
  .cal-scroll{background:var(--branco);border-radius:var(--raio);box-shadow:var(--sombra);
    overflow-x:auto;-webkit-overflow-scrolling:touch;padding:6px 0}
  table.cal{border-collapse:collapse;font-size:13px;width:100%}
  table.cal th,table.cal td{text-align:center;padding:0}
  table.cal td{height:46px;min-width:38px}
  table.cal thead th{height:48px;min-width:38px}
  th.rname,td.rname{position:sticky;left:0;background:var(--branco);z-index:2;
    min-width:72px;max-width:72px;text-align:left;padding:0 14px;font-weight:600;font-size:13px;
    border-right:1.5px solid #f0ece8;white-space:nowrap;color:var(--grafite)}
  thead th{font-weight:600;color:var(--grafite);border-bottom:1.5px solid #f0ece8;vertical-align:middle}
  thead .dn{display:block;line-height:1.1}
  thead .wd{font-size:9px;color:#bcb6ae;display:block;line-height:1;margin-top:3px;font-weight:500}
  thead th.is-weekend .dn{color:#bcb6ae}
  td.cell{border-right:1px solid #f7f4f1}
  tbody tr:not(:last-child) td{border-bottom:1px solid #f7f4f1}
  td.weekend{background:#fbf9f7}
  /* barra de ocupação */
  .bar{height:24px;background:var(--coral);margin:0 auto}
  td.ocup .bar{width:100%}
  td.ocup-start .bar{border-top-left-radius:12px;border-bottom-left-radius:12px;margin-left:3px;width:calc(100% - 3px)}
  td.ocup-end .bar{border-top-right-radius:12px;border-bottom-right-radius:12px;margin-right:3px;width:calc(100% - 3px)}
  td.ocup-start.ocup-end .bar{width:calc(100% - 6px);border-radius:12px}
  /* hoje */
  thead th.col-today .dn{background:var(--verde);color:#fff;border-radius:50%;
    width:24px;height:24px;line-height:24px;margin:0 auto;font-size:12px}
  td.col-today{box-shadow:inset 1px 0 0 var(--verde),inset -1px 0 0 var(--verde)}
  .legend{display:flex;gap:20px;justify-content:center;margin-top:16px;font-size:13px;color:#8a8a8a}
  .legend span{display:flex;align-items:center;gap:7px}
  .legend i{width:16px;height:16px;border-radius:5px;display:inline-block}
  .cal-loading{text-align:center;padding:48px 16px;color:#9a948c;font-size:14px}
  .refresh-btn{background:none;border:none;color:var(--coral);font-family:inherit;font-weight:600;
    font-size:13px;cursor:pointer;margin-top:16px;display:block;margin-left:auto;margin-right:auto}
</style>
</head>
<body>
<header>
  <div class="inner">
    <div class="mark">S</div>
    <div>
      <h1>Reservas · Alojamento</h1>
      <p>Operação de campo — O&amp;M Serena</p>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tabReservar">Reservar</button>
    <button class="tab" id="tabConsultar">Consultar</button>
  </div>
</header>

<div class="wrap">

  <!-- ============ ABA RESERVAR ============ -->
  <div class="view active" id="viewReservar">
    <div class="step-label">1 · Escolha o quarto</div>
    <div class="rooms" id="rooms"></div>

    <div class="step-label">2 · Período e responsável</div>
    <div class="card">
      <div class="dates">
        <div>
          <label for="checkin">Entrada</label>
          <input type="date" id="checkin">
        </div>
        <div>
          <label for="checkout">Saída</label>
          <input type="date" id="checkout">
        </div>
      </div>
      <label for="nome">Nome do solicitante</label>
      <input type="text" id="nome" placeholder="Nome completo" autocomplete="name">
      <label for="fone">Telefone</label>
      <input type="tel" id="fone" placeholder="(74) 9 9999-9999" autocomplete="tel">

      <button class="btn btn-primary" id="submit">Verificar e reservar</button>
    </div>

    <div class="feedback" id="feedback"></div>
  </div>

  <!-- ============ ABA CONSULTAR ============ -->
  <div class="view" id="viewConsultar">
    <div class="cal-head">
      <button class="cal-nav" id="prevM">‹</button>
      <span class="month-label" id="monthLabel">—</span>
      <button class="cal-nav" id="nextM">›</button>
    </div>
    <div class="cal-scroll" id="calScroll">
      <div class="cal-loading">Carregando ocupação…</div>
    </div>
    <div class="legend">
      <span><i style="background:#f5f2ef;border:1px solid #e2ddd7"></i> Livre</span>
      <span><i style="background:var(--coral)"></i> Ocupado</span>
    </div>
    <button class="refresh-btn" id="refreshCal">↻ Atualizar</button>
  </div>

  <div class="demo-flag" id="demoFlag"></div>
</div>

<script>
/* ============================================================
   CONFIGURAÇÃO  — cole as DUAS URLs aqui
   ============================================================ */
const POWER_AUTOMATE_URL = "https://default898e407823d6433c94aa51bf928dca.9d.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/5e0250831e7340499566242744e11bcd/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=y2Dz9-Ss7zWcZ6aacFQZzscf8FuAQve1ypbtSyciiF4";
const CONSULTA_URL       = "https://default898e407823d6433c94aa51bf928dca.9d.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/cb014cd47996476293f3aadab33e4929/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=u-KA5SjkrkQsltqjA4FURId_mPss-5P6Lm-FZe-YPLI";
const DEMO_MODE = false;   // true = funciona sozinho p/ demonstração | false = usa os fluxos

/* ============== DADOS DOS QUARTOS ============== */
const QUARTOS = [
  {id:"Quarto 01", amen:["Banheiro","Cama de casal","Guarda-roupa","TV","Mesa de trabalho"]},
  {id:"Quarto 02", amen:["Banheiro","Cama de casal","Guarda-roupa","TV","Mesa de trabalho"]},
  {id:"Quarto 03", amen:["Banheiro","Cama de casal","Guarda-roupa","TV"]},
  {id:"Quarto 04", amen:["Banheiro","Cama de casal","Guarda-roupa","TV","Mesa de trabalho"]},
  {id:"Quarto 05", amen:["Banheiro","Cama de casal","Guarda-roupa","TV"]},
];

/* Reservas de exemplo (só no modo demo) */
const RESERVAS_DEMO = [
  {quarto:"Quarto 01", checkin:"2026-06-20", checkout:"2026-06-25", nome:"João Silva"},
  {quarto:"Quarto 03", checkin:"2026-06-16", checkout:"2026-06-19", nome:"Maria Souza"},
];

/* ============== ESTADO ============== */
let quartoSel = null;

/* ============== ABAS ============== */
const tabReservar = document.getElementById("tabReservar");
const tabConsultar = document.getElementById("tabConsultar");
const viewReservar = document.getElementById("viewReservar");
const viewConsultar = document.getElementById("viewConsultar");

tabReservar.onclick = ()=>{
  tabReservar.classList.add("active"); tabConsultar.classList.remove("active");
  viewReservar.classList.add("active"); viewConsultar.classList.remove("active");
};
tabConsultar.onclick = ()=>{
  tabConsultar.classList.add("active"); tabReservar.classList.remove("active");
  viewConsultar.classList.add("active"); viewReservar.classList.remove("active");
  carregarConsulta();   // carrega a ocupação ao abrir a aba
};

/* ============== MONTAGEM DOS QUARTOS ============== */
const roomsEl = document.getElementById("rooms");
QUARTOS.forEach(q=>{
  const div = document.createElement("div");
  div.className = "room";
  div.innerHTML = `
    <div class="room-top">
      <span class="room-name">${q.id}</span>
      <span class="radio"></span>
    </div>
    <div class="amen">${q.amen.map(a=>`<span class="tag">${a}</span>`).join("")}</div>`;
  div.onclick = ()=>{
    document.querySelectorAll(".room").forEach(r=>r.classList.remove("sel"));
    div.classList.add("sel");
    quartoSel = q.id;
  };
  roomsEl.appendChild(div);
});

/* data mínima = hoje */
const hojeStr = new Date().toISOString().split("T")[0];
document.getElementById("checkin").min = hojeStr;
document.getElementById("checkout").min = hojeStr;

/* ============== LÓGICA DE DATAS ============== */
function sobrepoe(aIn,aOut,bIn,bOut){ return aIn < bOut && bIn < aOut; }
function proximaLivre(reservasQuarto, de){
  let cand = de, mexeu = true;
  while(mexeu){
    mexeu = false;
    for(const r of reservasQuarto){
      if(cand >= r.checkin && cand < r.checkout){ cand = r.checkout; mexeu = true; }
    }
  }
  return cand;
}
function fmt(d){ const [a,m,dia]=d.split("-"); return `${dia}/${m}/${a}`; }
function pad(n){ return String(n).padStart(2,"0"); }

/* ============== ENVIO DA RESERVA ============== */
const btn = document.getElementById("submit");
const fb = document.getElementById("feedback");

btn.onclick = async ()=>{
  const checkin  = document.getElementById("checkin").value;
  const checkout = document.getElementById("checkout").value;
  const nome     = document.getElementById("nome").value.trim();
  const fone     = document.getElementById("fone").value.trim();

  if(!quartoSel) return mostrarErro("Selecione um quarto", "Toque em um dos quartos acima para continuar.");
  if(!checkin || !checkout) return mostrarErro("Datas incompletas", "Informe a data de entrada e a de saída.");
  if(checkout <= checkin) return mostrarErro("Datas inválidas", "A saída precisa ser depois da entrada.");
  if(!nome) return mostrarErro("Nome obrigatório", "Informe o nome do solicitante.");
  if(!fone) return mostrarErro("Telefone obrigatório", "Informe um telefone de contato.");

  const reserva = {quarto:quartoSel, checkin, checkout, nome, telefone:fone};

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>Verificando…`;
  fb.className = "feedback";

  try{
    const resp = DEMO_MODE ? await verificarDemo(reserva) : await enviarFluxo(reserva);
    if(resp.status === "confirmed"){
      mostrarOk(reserva, resp.codigo);
    }else{
      mostrarConflito(reserva, resp.nextAvailable);
    }
  }catch(e){
    mostrarErro("Falha de conexão", "Não foi possível concluir agora. Verifique a internet e tente novamente.");
  }finally{
    btn.disabled = false;
    btn.textContent = "Verificar e reservar";
  }
};

async function verificarDemo(r){
  await new Promise(res=>setTimeout(res,600));
  const doQuarto = RESERVAS_DEMO.filter(x=>x.quarto===r.quarto);
  const conflito = doQuarto.some(x=>sobrepoe(r.checkin,r.checkout,x.checkin,x.checkout));
  if(conflito){
    return {status:"conflict", nextAvailable: proximaLivre(doQuarto, r.checkin)};
  }
  RESERVAS_DEMO.push(r);
  return {status:"confirmed", codigo:"ASR" + pad(RESERVAS_DEMO.length)};
}

async function enviarFluxo(r){
  const resp = await fetch(POWER_AUTOMATE_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify(r)
  });
  return await resp.json();
}

/* ============== FEEDBACK DA RESERVA ============== */
function mostrarOk(r, codigo){
  fb.className = "feedback fb-ok show";
  fb.innerHTML = `
    <div class="fb-title">${checkSvg()} Reserva confirmada</div>
    <div class="fb-body">
      <b>${r.quarto}</b> reservado para <b>${r.nome}</b><br>
      ${fmt(r.checkin)} → ${fmt(r.checkout)}<br>
      ${codigo ? `<div class="codigo-box">Código: <b>${codigo}</b></div>` : ``}
      Ruy Pacheco foi notificado.
    </div>`;
  fb.scrollIntoView({behavior:"smooth", block:"center"});
}
function mostrarConflito(r, next){
  fb.className = "feedback fb-err show";
  fb.innerHTML = `
    <div class="fb-title">${xSvg()} Quarto indisponível</div>
    <div class="fb-body">
      O <b>${r.quarto}</b> já está reservado nesse período.<br>
      Próxima data livre: <b>${fmt(next)}</b>.
    </div>
    <button class="next-btn" onclick="usarData('${next}')">Usar ${fmt(next)} como entrada</button>`;
  fb.scrollIntoView({behavior:"smooth", block:"center"});
}
function mostrarErro(titulo, msg){
  fb.className = "feedback fb-err show";
  fb.innerHTML = `<div class="fb-title">${xSvg()} ${titulo}</div><div class="fb-body">${msg}</div>`;
  fb.scrollIntoView({behavior:"smooth", block:"center"});
}
function usarData(d){ document.getElementById("checkin").value = d; fb.className="feedback"; }

function checkSvg(){return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#1f9b78" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;}
function xSvg(){return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#E03e33" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>`;}

/* ============================================================
   CONSULTA / CALENDÁRIO
   ============================================================ */
let reservasCache = null;          // guarda as reservas lidas do fluxo de consulta
let calRef = new Date();           // mês exibido
calRef.setDate(1);

const MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const WD = ["D","S","T","Q","Q","S","S"];

document.getElementById("prevM").onclick = ()=>{ calRef.setMonth(calRef.getMonth()-1); desenharCalendario(); };
document.getElementById("nextM").onclick = ()=>{ calRef.setMonth(calRef.getMonth()+1); desenharCalendario(); };
document.getElementById("refreshCal").onclick = ()=>{ reservasCache = null; carregarConsulta(); };

async function carregarConsulta(){
  const scroll = document.getElementById("calScroll");
  if(reservasCache){ desenharCalendario(); return; }   // já tem em cache
  scroll.innerHTML = `<div class="cal-loading"><span class="spinner spinner-coral"></span>Carregando ocupação…</div>`;
  try{
    if(DEMO_MODE){
      await new Promise(r=>setTimeout(r,500));
      reservasCache = RESERVAS_DEMO.map(r=>({quarto:r.quarto, checkin:r.checkin, checkout:r.checkout}));
    }else{
      const resp = await fetch(CONSULTA_URL,{ method:"POST", headers:{"Content-Type":"text/plain"}, body:"{}" });
      reservasCache = await resp.json();
    }
    desenharCalendario();
  }catch(e){
    scroll.innerHTML = `<div class="cal-loading">Não foi possível carregar a ocupação.<br>Toque em ↻ Atualizar para tentar de novo.</div>`;
  }
}

function desenharCalendario(){
  const scroll = document.getElementById("calScroll");
  const ano = calRef.getFullYear();
  const mes = calRef.getMonth();                 // 0-11
  document.getElementById("monthLabel").textContent = `${MESES[mes]} ${ano}`;

  const nDias = new Date(ano, mes+1, 0).getDate();
  const reservas = reservasCache || [];

  // função: o quarto q está ocupado no dia d?
  const ocup = (q, d)=>{
    const dia = `${ano}-${pad(mes+1)}-${pad(d)}`;
    return reservas.some(r=> r.quarto===q && dia >= r.checkin && dia < r.checkout);
  };

  // cabeçalho dos dias
  let thead = `<tr><th class="rname"></th>`;
  for(let d=1; d<=nDias; d++){
    const dow = new Date(ano, mes, d).getDay();
    const fds = (dow===0||dow===6);
    const isHoje = (`${ano}-${pad(mes+1)}-${pad(d)}` === hojeStr);
    thead += `<th class="${isHoje?'col-today':''} ${fds?'is-weekend':''}"><span class="dn">${d}</span><span class="wd">${WD[dow]}</span></th>`;
  }
  thead += `</tr>`;

  // uma linha por quarto, com barras contínuas
  let tbody = "";
  QUARTOS.forEach(q=>{
    tbody += `<tr><td class="rname">${q.id.replace("Quarto ","Qto ")}</td>`;
    for(let d=1; d<=nDias; d++){
      const dia = `${ano}-${pad(mes+1)}-${pad(d)}`;
      const dow = new Date(ano, mes, d).getDay();
      const fds = (dow===0||dow===6);
      const isHoje = (dia === hojeStr);
      const o = ocup(q, d);
      const inicio = o && !(d>1 && ocup(q, d-1));      // começo de um período
      const fim     = o && !(d<nDias && ocup(q, d+1));  // fim de um período
      const cls = ["cell",
        o?"ocup":"", inicio?"ocup-start":"", fim?"ocup-end":"",
        fds?"weekend":"", isHoje?"col-today":""].filter(Boolean).join(" ");
      tbody += `<td class="${cls}">${o?'<div class="bar"></div>':''}</td>`;
    }
    tbody += `</tr>`;
  });

  scroll.innerHTML = `<table class="cal"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
}

document.getElementById("demoFlag").textContent =
  DEMO_MODE ? "Modo demonstração ativo — dados não são salvos." : "";
</script>
</body>
</html>
