<!--
  Sistema de Reservas — Alojamento Corporativo (Serena O&M)
  Exemplo funcional / protótipo

  COMO LIGAR NO POWER AUTOMATE (produção):
  1. Crie um fluxo com gatilho "Quando uma solicitação HTTP é recebida".
  2. Cole a URL gerada em POWER_AUTOMATE_URL abaixo.
  3. Coloque DEMO_MODE = false.
  O fluxo deve responder JSON:
     {"status":"confirmed"}  ou  {"status":"conflict","nextAvailable":"2026-07-15"}

  Enquanto DEMO_MODE = true, o app funciona sozinho (dados em memória) só
  para você demonstrar a lógica para o chefe.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FF5246">
<title>Reservas · Alojamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --coral:#FF5246;
    --coral-dark:#E03e33;
    --grafite:#4B4B4B;
    --areia:#EDE9E5;
    --branco:#FFFFFF;
    --verde:#32CAA0;
    --verde-dark:#1f9b78;
    --sombra:0 4px 16px rgba(75,75,75,.10);
    --raio:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Poppins',system-ui,sans-serif;
    background:var(--areia);
    color:var(--grafite);
    line-height:1.5;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px 48px}

  /* Cabeçalho */
  header{
    background:var(--branco);
    padding:20px 16px;
    margin-bottom:20px;
    border-bottom:3px solid var(--coral);
  }
  header .inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:12px}
  .mark{
    width:40px;height:40px;border-radius:10px;
    background:var(--coral);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:18px;
  }
  header h1{font-size:18px;font-weight:600;color:var(--grafite)}
  header p{font-size:13px;color:#8a8a8a;font-weight:400}

  /* Passos */
  .step-label{font-size:13px;font-weight:600;color:var(--coral);text-transform:uppercase;letter-spacing:.06em;margin:24px 4px 12px}

  /* Cartões de quarto */
  .rooms{display:grid;gap:12px}
  .room{
    background:var(--branco);border-radius:var(--raio);padding:16px;
    border:2px solid transparent;cursor:pointer;transition:border-color .15s, transform .1s;
    box-shadow:var(--sombra);
  }
  .room:active{transform:scale(.99)}
  .room.sel{border-color:var(--coral)}
  .room-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .room-name{font-weight:600;font-size:16px}
  .radio{width:22px;height:22px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;position:relative}
  .room.sel .radio{border-color:var(--coral)}
  .room.sel .radio::after{content:'';position:absolute;inset:4px;border-radius:50%;background:var(--coral)}
  .amen{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:12px;background:var(--areia);color:var(--grafite);padding:3px 9px;border-radius:20px;font-weight:500}

  /* Formulário */
  .card{background:var(--branco);border-radius:var(--raio);padding:18px;box-shadow:var(--sombra)}
  label{display:block;font-size:13px;font-weight:500;margin:14px 0 6px}
  label:first-child{margin-top:0}
  input{
    width:100%;font-family:inherit;font-size:16px;color:var(--grafite);
    padding:13px 14px;border:1.5px solid #ddd;border-radius:12px;background:#fafafa;
  }
  input:focus{outline:none;border-color:var(--coral);background:#fff}
  .dates{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* Botões */
  .btn{
    width:100%;font-family:inherit;font-size:16px;font-weight:600;
    padding:15px;border:none;border-radius:12px;cursor:pointer;margin-top:20px;
    transition:background .15s, opacity .15s;
  }
  .btn-primary{background:var(--coral);color:#fff}
  .btn-primary:active{background:var(--coral-dark)}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  /* Feedback */
  .feedback{margin-top:18px;border-radius:var(--raio);padding:18px;display:none}
  .feedback.show{display:block;animation:pop .25s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fb-ok{background:rgba(50,202,160,.12);border:1.5px solid var(--verde)}
  .fb-err{background:rgba(255,82,70,.10);border:1.5px solid var(--coral)}
  .fb-title{font-weight:600;font-size:16px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .fb-ok .fb-title{color:var(--verde-dark)}
  .fb-err .fb-title{color:var(--coral-dark)}
  .fb-body{font-size:14px;color:var(--grafite)}
  .fb-body b{font-weight:600}
  .next-btn{
    margin-top:12px;background:var(--coral);color:#fff;border:none;
    padding:10px 16px;border-radius:10px;font-family:inherit;font-weight:500;font-size:14px;cursor:pointer;
  }
  .icon{width:22px;height:22px;flex-shrink:0}
  .spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .demo-flag{font-size:11px;text-align:center;color:#b0a89e;margin-top:24px}
</style>
</head>
<body>
<header>
  <div class="inner">
    <div class="mark">S</div>
    <div>
      <h1>Reservas · Alojamento</h1>
      <p>Operação de campo — O&amp;M Serena</p>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="step-label">1 · Escolha o quarto</div>
  <div class="rooms" id="rooms"></div>

  <div class="step-label">2 · Período e responsável</div>
  <div class="card">
    <div class="dates">
      <div>
        <label for="checkin">Entrada</label>
        <input type="date" id="checkin">
      </div>
      <div>
        <label for="checkout">Saída</label>
        <input type="date" id="checkout">
      </div>
    </div>
    <label for="nome">Nome do solicitante</label>
    <input type="text" id="nome" placeholder="Nome completo" autocomplete="name">
    <label for="fone">Telefone</label>
    <input type="tel" id="fone" placeholder="(74) 9 9999-9999" autocomplete="tel">

    <button class="btn btn-primary" id="submit">Verificar e reservar</button>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="demo-flag" id="demoFlag"></div>
</div>

<script>
/* ============== CONFIGURAÇÃO ============== */
const POWER_AUTOMATE_URL = "https://default898e407823d6433c94aa51bf928dca.9d.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/5e0250831e7340499566242744e11bcd/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=y2Dz9-Ss7zWcZ6aacFQZzscf8FuAQve1ypbtSyciiF4";
const DEMO_MODE = false;   // true = funciona sozinho p/ demonstração | false = usa Power Automate

/* ============== DADOS DOS QUARTOS ============== */
const QUARTOS = [
  {id:"Quarto 01", amen:["Banheiro","Cama de casal","Guarda-roupa","TV","Mesa de trabalho"]},
  {id:"Quarto 02", amen:["Banheiro","Cama de casal","Guarda-roupa","TV","Mesa de trabalho"]},
  {id:"Quarto 03", amen:["Banheiro","Cama de casal","Guarda-roupa","TV"]},
  {id:"Quarto 04", amen:["Banheiro","Cama de casal","Guarda-roupa","TV","Mesa de trabalho"]},
  {id:"Quarto 05", amen:["Banheiro","Cama de casal","Guarda-roupa","TV"]},
];

/* Reservas de exemplo (só no modo demo) para mostrar a regra de conflito */
const RESERVAS_DEMO = [
  {quarto:"Quarto 01", checkin:"2026-06-20", checkout:"2026-06-25", nome:"João Silva"},
  {quarto:"Quarto 03", checkin:"2026-06-16", checkout:"2026-06-19", nome:"Maria Souza"},
];

/* ============== ESTADO ============== */
let quartoSel = null;

/* ============== MONTAGEM DOS QUARTOS ============== */
const roomsEl = document.getElementById("rooms");
QUARTOS.forEach(q=>{
  const div = document.createElement("div");
  div.className = "room";
  div.innerHTML = `
    <div class="room-top">
      <span class="room-name">${q.id}</span>
      <span class="radio"></span>
    </div>
    <div class="amen">${q.amen.map(a=>`<span class="tag">${a}</span>`).join("")}</div>`;
  div.onclick = ()=>{
    document.querySelectorAll(".room").forEach(r=>r.classList.remove("sel"));
    div.classList.add("sel");
    quartoSel = q.id;
  };
  roomsEl.appendChild(div);
});

/* data mínima = hoje */
const hoje = new Date().toISOString().split("T")[0];
document.getElementById("checkin").min = hoje;
document.getElementById("checkout").min = hoje;

/* ============== LÓGICA DE DATAS ============== */
// Dois períodos se sobrepõem se: inicioA < fimB E inicioB < fimA
// (o dia da saída fica livre para uma nova entrada — padrão hoteleiro)
function sobrepoe(aIn,aOut,bIn,bOut){ return aIn < bOut && bIn < aOut; }

// próxima data livre para o quarto, a partir de "de"
function proximaLivre(reservasQuarto, de){
  let cand = de, mexeu = true;
  while(mexeu){
    mexeu = false;
    for(const r of reservasQuarto){
      if(cand >= r.checkin && cand < r.checkout){ cand = r.checkout; mexeu = true; }
    }
  }
  return cand;
}

function fmt(d){ const [a,m,dia]=d.split("-"); return `${dia}/${m}/${a}`; }

/* ============== ENVIO ============== */
const btn = document.getElementById("submit");
const fb = document.getElementById("feedback");

btn.onclick = async ()=>{
  const checkin  = document.getElementById("checkin").value;
  const checkout = document.getElementById("checkout").value;
  const nome     = document.getElementById("nome").value.trim();
  const fone     = document.getElementById("fone").value.trim();

  // validação básica
  if(!quartoSel) return mostrarErro("Selecione um quarto", "Toque em um dos quartos acima para continuar.");
  if(!checkin || !checkout) return mostrarErro("Datas incompletas", "Informe a data de entrada e a de saída.");
  if(checkout <= checkin) return mostrarErro("Datas inválidas", "A saída precisa ser depois da entrada.");
  if(!nome) return mostrarErro("Nome obrigatório", "Informe o nome do solicitante.");
  if(!fone) return mostrarErro("Telefone obrigatório", "Informe um telefone de contato.");

  const reserva = {quarto:quartoSel, checkin, checkout, nome, telefone:fone};

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>Verificando…`;
  fb.className = "feedback";

  try{
    const resp = DEMO_MODE ? await verificarDemo(reserva) : await enviarFluxo(reserva);
    if(resp.status === "confirmed"){
      mostrarOk(reserva);
    }else{
      mostrarConflito(reserva, resp.nextAvailable);
    }
  }catch(e){
    mostrarErro("Falha de conexão", "Não foi possível concluir agora. Verifique a internet e tente novamente.");
  }finally{
    btn.disabled = false;
    btn.textContent = "Verificar e reservar";
  }
};

/* modo demo: faz a verificação localmente */
async function verificarDemo(r){
  await new Promise(res=>setTimeout(res,600)); // simula latência
  const doQuarto = RESERVAS_DEMO.filter(x=>x.quarto===r.quarto);
  const conflito = doQuarto.some(x=>sobrepoe(r.checkin,r.checkout,x.checkin,x.checkout));
  if(conflito){
    return {status:"conflict", nextAvailable: proximaLivre(doQuarto, r.checkin)};
  }
  RESERVAS_DEMO.push(r); // "bloqueia" o período
  return {status:"confirmed"};
}

/* modo produção: chama o Power Automate */
async function enviarFluxo(r){
  // Content-Type text/plain evita o "preflight" do navegador (erro de CORS).
  // O corpo continua sendo JSON; o fluxo faz o Parse JSON dele.
  const resp = await fetch(POWER_AUTOMATE_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify(r)
  });
  return await resp.json();
}

/* ============== FEEDBACK NA TELA ============== */
function mostrarOk(r){
  fb.className = "feedback fb-ok show";
  fb.innerHTML = `
    <div class="fb-title">${checkSvg()} Reserva confirmada</div>
    <div class="fb-body">
      <b>${r.quarto}</b> reservado para <b>${r.nome}</b><br>
      ${fmt(r.checkin)} → ${fmt(r.checkout)}<br>
      Aldenira e Ruy Pacheco foram notificados.
    </div>`;
  fb.scrollIntoView({behavior:"smooth", block:"center"});
}

function mostrarConflito(r, next){
  fb.className = "feedback fb-err show";
  fb.innerHTML = `
    <div class="fb-title">${xSvg()} Quarto indisponível</div>
    <div class="fb-body">
      O <b>${r.quarto}</b> já está reservado nesse período.<br>
      Próxima data livre: <b>${fmt(next)}</b>.
    </div>
    <button class="next-btn" onclick="usarData('${next}')">Usar ${fmt(next)} como entrada</button>`;
  fb.scrollIntoView({behavior:"smooth", block:"center"});
}

function mostrarErro(titulo, msg){
  fb.className = "feedback fb-err show";
  fb.innerHTML = `<div class="fb-title">${xSvg()} ${titulo}</div><div class="fb-body">${msg}</div>`;
  fb.scrollIntoView({behavior:"smooth", block:"center"});
}

function usarData(d){ document.getElementById("checkin").value = d; fb.className="feedback"; }

function checkSvg(){return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#1f9b78" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;}
function xSvg(){return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#E03e33" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>`;}

document.getElementById("demoFlag").textContent =
  DEMO_MODE ? "Modo demonstração ativo — dados não são salvos." : "";
</script>
</body>
</html>
